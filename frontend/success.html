<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pago Exitoso | Tienda Oly</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <div class="result-card">
    <div class="result-header success">
      <div class="result-icon">✅</div>
      <h1>¡Pago exitoso!</h1>
      <p>Tu compra ha sido procesada correctamente</p>
    </div>

    <div class="result-body">
      <div class="info-box success">
        <div class="info-row">
          <span>Estado</span>
          <span style="color:#2e7d32">✅ Aprobado</span>
        </div>
        <div class="info-row">
          <span>ID de pago</span>
          <span id="payment-id">—</span>
        </div>
        <div class="info-row">
          <span>Referencia</span>
          <span id="external-ref">—</span>
        </div>
        <div class="info-row">
          <span>Método</span>
          <span id="payment-type">—</span>
        </div>
      </div>

      <a href="https://tiendaoly.grupoahost.com/" class="btn-primary">
        🛒 Volver a la tienda
      </a>
      <a href="checkout.html" class="btn-secondary">
        Realizar otro pago
      </a>
    </div>

    <div class="card-footer">
      Procesado por 💳 <strong>MercadoPago</strong> · Tienda Oly © 2026
    </div>
  </div>

  <script src="js/success.js"></script>
</body>
</html>
